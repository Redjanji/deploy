server:
  port: 8088
  address: 0.0.0.0

spring:
  application:
    name: message-service
  config:
    import: "optional:nacos:message-service.yaml"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  zipkin:
    base-url: http://localhost:9411

  rabbitmq:
    host: ${RABBITMQ_HOST:172.24.35.23}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    connection-timeout: 10s
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms

  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:753280878@qq.com}
    password: ${MAIL_PASSWORD:ufhravxbjladbeig}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: true

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:172.24.35.23}:3306/message_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 短信配置（预留）
sms:
  provider: mock
  mock-enabled: true

# 消息配置
message:
  max-retry: 3
  retry-interval-ms: 5000
  send:
    exchange: message.send.exchange
    queue: message.send.queue
    routing-key: message.send

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
