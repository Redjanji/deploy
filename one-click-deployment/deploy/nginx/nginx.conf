worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time $upstream_status';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log debug;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/xml+rss application/rss+xml
               font/truetype font/opentype image/svg+xml image/x-icon;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    upstream api_gateway {
        server xss-gateway:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_body_timeout 60s;
        client_header_timeout 60s;
        send_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-App-Id,X-User-Id,X-Owner-Id';
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host gateway-service;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            limit_req zone=api_limit burst=100 nodelay;
        }

        location = /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
