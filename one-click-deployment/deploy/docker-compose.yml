# =====================================================
# XSS 微服务集群 - 单机 Docker Compose 部署（4核/4GB 优化版）
# =====================================================
# 服务器配置：4核 CPU / 4GB 内存 / 40GB 系统盘 / 3MB 带宽
# 资源分配策略（总计 ~3.2GB，预留 ~800MB 给系统）：
#   - 系统预留：800MB
#   - 中间件：1536MB（MySQL 384M + ES 384M + Nacos 256M + Redis 128M + RabbitMQ 128M + MinIO 128M + nginx 128M）
#   - 业务服务：1536MB（11个服务，核心服务 160M，普通服务 96-128M）
#
# 分批启动（profiles）：
#   - infra:    中间件层（MySQL/Redis/RabbitMQ/ES/MinIO/Nacos）
#   - core:     核心业务（gateway/auth/property/dict）
#   - business: 其他业务（search/analytics/message/favorite/review/booking/image）
#   - nginx:    Nginx 反向代理
#
# 使用方式：
#   docker compose up -d          # 启动全部
#   docker compose --profile infra up -d     # 仅启动中间件
#   docker compose --profile core up -d      # 启动核心业务
#   docker compose --profile business up -d  # 启动其他业务
# =====================================================

networks:
  xss-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  es-data:
  minio-data:
  nacos-data:
  nginx-log:

x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

x-common-restart: &common-restart
  restart: unless-stopped

services:
  # =====================================================
  # 一、基础设施（中间件）
  # =====================================================

  mysql:
    image: mysql:8.0
    container_name: xss-mysql
    <<: *common-restart
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=100
      - --innodb_buffer_pool_size=128M
      - --innodb_log_file_size=32M
      - --performance-schema=OFF
      - --table_open_cache=256
      - --max_allowed_packet=64M
      - --net_read_timeout=300
      - --net_write_timeout=300
      - --wait_timeout=300
      - --interactive_timeout=300
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: xss-redis
    <<: *common-restart
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redisroot} --appendonly yes --maxmemory 96mb --maxmemory-policy allkeys-lru
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisroot}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: xss-rabbitmq
    <<: *common-restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+P 1024 +A 16"
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: xss-elasticsearch
    <<: *common-restart
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms192m -Xmx192m
      - cluster.name=xss-es-cluster
      - thread_pool.search.size=1
      - thread_pool.search.queue_size=50
      - thread_pool.write.size=1
      - thread_pool.write.queue_size=50
      - indices.memory.index_buffer_size=20%
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: xss-minio
    <<: *common-restart
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: xss-nacos
    <<: *common-restart
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-nacos}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      JVM_XMS: 256m
      JVM_XMX: 384m
      JVM_XMN: 192m
      NACOS_DEBUG: "n"
      TOMCAT_ACCESSLOG_ENABLED: "false"
      NACOS_SERVER_PORT: 8848
      NACOS_GRPC_PORT: 9848
      NACOS_GRPC_TLS_PORT: 9849
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - ./nacos-config:/home/nacos/init-config
    networks:
      - xss-net
    profiles: ["infra"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:8848/nacos/v1/console/health/readiness > /dev/null 2>&1 && curl -s http://127.0.0.1:8848/nacos/v1/ns/service/list?pageNo=1&pageSize=10 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # =====================================================
  # 二、核心业务服务（第2批）
  # =====================================================

  gateway-service:
    image: xss/gateway-service:latest
    container_name: xss-gateway
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - JWT_SECRET=${JWT_SECRET:-eW91ci0yNTYtYml0LXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLWRldi1vbmx5}
      - APP_SECRET_BACKEND=${APP_SECRET_BACKEND:-XssBackend2026SecHmacKey8xYz}
      - APP_SECRET_DASHBOARD=${APP_SECRET_DASHBOARD:-dev-secret-key-change-in-production}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - xss-net
    profiles: ["core"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 192M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  auth-service:
    image: xss/auth-service:latest
    container_name: xss-auth
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisroot}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - JWT_SECRET=${JWT_SECRET:-eW91ci0yNTYtYml0LXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLWRldi1vbmx5}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["core"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.15'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  property-service:
    image: xss/property-service:latest
    container_name: xss-property
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["core"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.15'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  dict-service:
    image: xss/dict-service:latest
    container_name: xss-dict
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisroot}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["core"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =====================================================
  # 三、其他业务服务（第3批）
  # =====================================================

  image-service:
    image: xss/image-service:latest
    container_name: xss-image
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      nacos:
        condition: service_healthy

  search-service:
    image: xss/search-service:latest
    container_name: xss-search
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - ES_URIS=http://elasticsearch:9200
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms32m -Xmx96m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 160M
        reservations:
          cpus: '0.1'
          memory: 96M
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  analytics-service:
    image: xss/analytics-service:latest
    container_name: xss-analytics
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisroot}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  message-service:
    image: xss/message-service:latest
    container_name: xss-message
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MAIL_USERNAME=${MAIL_USERNAME:-753280878@qq.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-ufhravxbjladbeig}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  favorite-service:
    image: xss/favorite-service:latest
    container_name: xss-favorite
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms32m -Xmx64m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 80M
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  review-service:
    image: xss/review-service:latest
    container_name: xss-review
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - REVIEW_INTERNAL_TOKEN=${REVIEW_INTERNAL_TOKEN:-internal-token-review-xxx}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  booking-service:
    image: xss/booking-service:latest
    container_name: xss-booking
    <<: *common-restart
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASS=${MYSQL_ROOT_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MESSAGE_NOTIFY_ADMIN_EMAIL=${MESSAGE_NOTIFY_ADMIN_EMAIL:-redjanji@163.com}
      - MANAGEMENT_ZIPKIN_TRACING_ENABLED=false
      - MANAGEMENT_TRACING_ENABLED=false
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    networks:
      - xss-net
    profiles: ["business"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # =====================================================
  # 四、Nginx 反向代理（最后启动）
  # =====================================================

  nginx:
    image: nginx:1.27-alpine
    container_name: xss-nginx
    <<: *common-restart
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      - nginx-log:/var/log/nginx
    networks:
      - xss-net
    profiles: ["nginx"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    depends_on:
      gateway-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
