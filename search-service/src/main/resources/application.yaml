server:
  port: 8086
  address: 0.0.0.0

spring:
  application:
    name: search-service
  config:
    import: "optional:nacos:search-service.yaml"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  zipkin:
    base-url: http://localhost:9411
    sender:
      type: web
  sleuth:
    sampler:
      probability: 0.1
  elasticsearch:
    uris: ${ES_URIS:http://172.24.35.23:9200}
    connection-timeout: 5s
    socket-timeout: 30s
    rest-client:
      discovery-enabled: false
    properties:
      client:
        retry:
          enable: true
          max-attempts: 3
  rabbitmq:
    host: ${RABBITMQ_HOST:172.24.35.23}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    connection-timeout: 10s
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms

property-service:
  base-url: http://property-service:8085

elasticsearch:
  index-name: properties

sync:
  property-exchange: property.sync.exchange
  property-queue: property.sync.queue
  property-routing-key: property.sync

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.1
